<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
  <div class="bg-white p-6 rounded shadow w-96">
    <h2 class="text-xl mb-4 text-center">Register</h2>

    <input id="username" class="border p-2 w-full mb-2" placeholder="Username" />
    <input id="password" type="password" class="border p-2 w-full mb-4" placeholder="Password" />

    <button onclick="register()" class="bg-green-500 text-white px-4 py-2 w-full rounded">
      Register
    </button>

    <p class="mt-3 text-center text-sm">
      Already have an account?
      <a href="login.html" class="text-blue-500">Login</a>
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
