<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white">Create Account</h2>
      <p class="text-slate-300 mt-2">Register and start chatting</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm text-slate-200 mb-1">Username</label>
        <input
          id="username"
          type="text"
          placeholder="Choose username"
          class="w-full bg-white/10 text-white placeholder-slate-300 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-400"
        />
      </div>

      <div>
        <label class="block text-sm text-slate-200 mb-1">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Create password"
          class="w-full bg-white/10 text-white placeholder-slate-300 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-emerald-400"
        />
      </div>

      <button
        onclick="register()"
        class="w-full bg-gradient-to-r from-emerald-500 to-cyan-500 hover:from-emerald-600 hover:to-cyan-600 text-white font-semibold py-3 rounded-2xl transition"
      >
        Register
      </button>
    </div>

    <p class="mt-6 text-center text-sm text-slate-300">
      Already have an account?
      <a href="/login.html" class="text-cyan-300 font-semibold hover:underline">Login</a>
    </p>
  </div>

  <script src="app.js"></script>
</body>
</html>
