<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Realtime Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-800 flex items-center justify-center p-4">

  <div class="w-full max-w-3xl bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl shadow-2xl overflow-hidden">
    
    <div class="bg-gradient-to-r from-indigo-600 to-cyan-500 px-6 py-5 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold text-white">Realtime Chat</h1>
        <p class="text-sm text-indigo-100">Chat with style</p>
      </div>

      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-xs text-indigo-100">Logged in as</p>
          <p id="currentUser" class="text-white font-semibold">Guest</p>
        </div>
        <button
          onclick="logout()"
          class="bg-white/20 hover:bg-white/30 text-white text-sm px-4 py-2 rounded-xl transition"
        >
          Logout
        </button>
      </div>
    </div>

    <div class="p-5">
      <div
        id="messages"
        class="h-[420px] overflow-y-auto rounded-2xl bg-black/20 border border-white/10 p-4 space-y-3"
      ></div>

      <div id="typing" class="h-6 text-sm text-slate-300 italic px-1 mt-2"></div>

      <div class="mt-3 flex gap-2">
        <input
          id="msg"
          type="text"
          placeholder="Type your message..."
          class="flex-1 bg-white/10 text-white placeholder-slate-300 border border-white/10 rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-cyan-400"
        />
        <button
          onclick="sendMessage()"
          class="bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-600 hover:to-cyan-600 text-white font-semibold px-6 py-3 rounded-2xl transition"
        >
          Send
        </button>
      </div>

      <div class="mt-5 flex justify-center gap-5 text-sm">
        <a href="/login.html" class="text-cyan-300 hover:underline">Login</a>
        <a href="/register.html" class="text-cyan-300 hover:underline">Register</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
