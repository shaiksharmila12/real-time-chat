<!DOCTYPE html>
<html>
<head>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">

<div class="bg-white p-6 rounded shadow w-96">
  <h2 class="text-xl mb-4">Chat Room</h2>

  <div id="messages" class="h-48 overflow-y-auto border p-2 mb-2"></div>
  <div id="typing" class="text-sm text-gray-400"></div>

  <input id="msg" class="border p-2 w-full mb-2" placeholder="Type message" />

  <button onclick="sendMessage()" class="bg-blue-500 text-white px-4 py-2 w-full rounded">
    Send
  </button>

  <p class="text-center mt-3 text-sm">
    <a href="/login.html" class="text-blue-500">Login</a> |
    <a href="/register.html" class="text-blue-500">Register</a>
  </p>
</div>

<script src="app.js"></script>

</body>
</html>
